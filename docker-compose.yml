services:
  copy:
    build: .
    container_name: polymoney
    restart: unless-stopped          # авто-рестарт при падении и после ребута сервера
    environment:
      DASH_HOST: "0.0.0.0"
      DASH_PORT: "5000"
      BANKROLL: "10000"
      PER_TRADE: "10"
      INTERVAL: "60"                 # цикл стал лёгким (редкий скан позиций) -> опрашиваем чаще
    ports:
      - "5000:5000"                  # открыт по http://IP:5000 (бумага, без ключей — ок)
    volumes:
      - .:/app                       # состояние (paper_book, watchlist, perf_history) живёт на хосте
